<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 6; }
      .box-primary { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 6; }
      .box-accent { fill: #f1f5f9; stroke: #475569; stroke-width: 1.5; rx: 6; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #1e293b; }
      .label-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
      .label-small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #64748b; }
      .header { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-down { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#ffffff"/>

  <text x="400" y="35" text-anchor="middle" class="header">QSL 架构概览</text>
  <text x="400" y="55" text-anchor="middle" class="label-small">Quantum Search Language — 轻量 · 中文友好 · AI 驱动</text>

  <rect x="30" y="75" width="740" height="50" class="box-primary"/>
  <text x="400" y="105" text-anchor="middle" class="label-title">用户接口</text>
  <text x="400" y="120" text-anchor="middle" class="label-small">Python API · 命令行 · 自然语言 (AI 科学家) · DSL</text>

  <rect x="30" y="150" width="220" height="70" class="box"/>
  <text x="140" y="178" text-anchor="middle" class="label-title">AI 量子科学家</text>
  <text x="140" y="198" text-anchor="middle" class="label-small">LLM 集成 · 自动验证 · 中文演示</text>

  <rect x="280" y="150" width="240" height="70" class="box"/>
  <text x="400" y="178" text-anchor="middle" class="label-title">量子电路核心</text>
  <text x="400" y="198" text-anchor="middle" class="label-small">QuantumCircuit · Gate · Parameter</text>

  <rect x="550" y="150" width="220" height="70" class="box"/>
  <text x="660" y="178" text-anchor="middle" class="label-title">可视化</text>
  <text x="660" y="198" text-anchor="middle" class="label-small">电路图 · 直方图 · Bloch 球</text>

  <rect x="30" y="250" width="220" height="70" class="box"/>
  <text x="140" y="278" text-anchor="middle" class="label-title">量子算法</text>
  <text x="140" y="298" text-anchor="middle" class="label-small">Grover · Shor · QFT · QAOA · VQE</text>

  <rect x="280" y="250" width="240" height="70" class="box"/>
  <text x="400" y="278" text-anchor="middle" class="label-title">编译器</text>
  <text x="400" y="298" text-anchor="middle" class="label-small">优化 ·  transpile · 误差缓解</text>

  <rect x="550" y="250" width="220" height="70" class="box-accent"/>
  <text x="660" y="278" text-anchor="middle" class="label-title">生态互通</text>
  <text x="660" y="298" text-anchor="middle" class="label-small">Qiskit · Cirq · OpenQASM</text>

  <rect x="30" y="350" width="365" height="80" class="box"/>
  <text x="212" y="380" text-anchor="middle" class="label-title">本地模拟器</text>
  <text x="212" y="400" text-anchor="middle" class="label-small">态向量 (numpy) · 密度矩阵 · 噪声模型</text>
  <text x="212" y="418" text-anchor="middle" class="label-small">GPU 加速 (cupy) · 26-28 比特</text>

  <rect x="405" y="350" width="365" height="80" class="box"/>
  <text x="587" y="380" text-anchor="middle" class="label-title">后端</text>
  <text x="587" y="400" text-anchor="middle" class="label-small">IBM Quantum · AWS Braket</text>
  <text x="587" y="418" text-anchor="middle" class="label-small">自动后端选择</text>

  <line x1="400" y1="125" x2="400" y2="145" class="arrow-down"/>
  <line x1="400" y1="125" x2="140" y2="145" class="arrow-down"/>
  <line x1="400" y1="125" x2="660" y2="145" class="arrow-down"/>

  <line x1="140" y1="220" x2="140" y2="245" class="arrow-down"/>
  <line x1="400" y1="220" x2="400" y2="245" class="arrow-down"/>
  <line x1="660" y1="220" x2="660" y2="245" class="arrow-down"/>

  <line x1="250" y1="185" x2="275" y2="185" class="arrow"/>
  <line x1="520" y1="185" x2="545" y2="185" class="arrow"/>

  <line x1="140" y1="320" x2="212" y2="345" class="arrow-down"/>
  <line x1="400" y1="320" x2="212" y2="345" class="arrow-down"/>
  <line x1="400" y1="320" x2="587" y2="345" class="arrow-down"/>
  <line x1="660" y1="320" x2="587" y2="345" class="arrow-down"/>

  <line x1="395" y1="390" x2="400" y2="390" class="arrow"/>

  <text x="400" y="475" text-anchor="middle" class="label-small">核心依赖: numpy | 版本: v0.6.3</text>
</svg>
